name: CI - CGA Metrology System

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar SDK .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verificar versión de .NET
        run: dotnet --version

      - name: Restaurar dependencias
        run: dotnet restore ./CGA.MetrologySystem.slnx

      - name: Compilar solución en Release
        run: dotnet build ./CGA.MetrologySystem.slnx --no-restore --configuration Release

      - name: Ejecutar pruebas automatizadas
        run: >
          dotnet test ./CGA.MetrologySystem.Tests/CGA.MetrologySystem.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=cga-metrology-tests.trx"
          --results-directory ./TestResults

      - name: Publicar reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cga-metrology-test-results
          path: ./TestResults/*.trx
          if-no-files-found: warn
